server {
    listen 443 ssl;
    server_name mex.app.br;

    ssl_certificate /etc/letsencrypt/live/mex.app.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mex.app.br/privkey.pem;

    # SPA admin em /admin/
    location ^~ /admin/ {
        alias /home/ubuntu/mex-admin/dist/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache";
    }
    location = /admin {
        return 301 /admin/;
    }
    # Proxy para API
    location /api/ {
        proxy_pass http://localhost:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}